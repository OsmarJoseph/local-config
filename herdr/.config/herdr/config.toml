onboarding = false
# ~/.config/herdr/config.toml  — Stow: dotfiles/herdr/.config/herdr/config.toml
# Mirrors tmux/.config/tmux/tmux.conf.  workspace=tmux session, tab=tmux window, pane=pane.

[theme]
name = "tokyo-night"

auto_switch = false
[terminal]
new_cwd = "follow"                   # new panes/tabs/workspaces inherit cwd (tmux: -c "#{pane_current_path}")

[keys]
# Prefix: literal ∞ (U+221E), produced by Right-⌘+D via Karabiner — identical to tmux.
prefix = "∞"

# panes
split_vertical   = "prefix+\\"                # tmux `\`  side-by-side (split-window -h)
split_horizontal = "prefix+minus"             # tmux `-`  stacked      (split-window -v)
copy_mode        = "prefix+v"                 # tmux `v`  (vi copy keys are built-in)
close_pane       = "prefix+w"                 # tmux `w`  kill pane
zoom             = ["prefix+z", "prefix+m"]   # tmux stock `z` + custom `m`
resize_mode      = "prefix+shift+r"           # mode: h/l width, j/k height, esc  (replaces prefix+hjkl -r resize)
# focus_pane_* kept at herdr defaults (prefix+h/j/k/l) as fallback; primary nav = Ctrl+hjkl (below)

# tabs (tmux windows)
previous_tab = "prefix+["                     # tmux `[`
next_tab     = "prefix+]"                      # tmux `]`
new_tab      = "prefix+t"                      # tmux `t`
rename_tab   = "prefix+colon"                  # tmux stock rename-window
close_tab    = "prefix+ampersand"              # tmux stock kill-window
goto         = "prefix+s"                       # searchable workspace/tab/pane switcher (primary picker)

# workspaces (tmux sessions)
new_workspace      = "prefix+n"                # tmux `n`  new-session
workspace_picker   = "prefix+x"                # native workspace picker
previous_workspace = "prefix+="                # tmux `=`  switch-client -l (nearest; sequential, not MRU)

# misc
detach        = "prefix+d"                     # tmux stock detach
reload_config = "prefix+r"                     # tmux `r`

[ui]
prompt_new_tab_name = false                    # tmux new-window is immediate, no name prompt
mouse_capture = true                           # tmux `set -g mouse on`

show_agent_labels_on_pane_borders = true
[ui.toast]
delivery = "system"                            # desktop notification when a background agent finishes/blocks

[ui.sound]
enabled = true                                 # audible cue on agent state change (droid muted by default)

[session]
resume_agents_on_restore = true                # native Claude/agent session resume after restart

[experimental]
pane_history = true                            # replay pane scrollback after restart (≈ @resurrect-capture-pane-contents 'on')

# seamless Ctrl+hjkl pane nav (replaces christoomey/vim-tmux-navigator)
[[keys.command]]
key = "ctrl+h"
type = "plugin_action"
command = "vim-herdr-navigation.left"
description = "navigate left (vim/herdr)"
[[keys.command]]
key = "ctrl+j"
type = "plugin_action"
command = "vim-herdr-navigation.down"
description = "navigate down (vim/herdr)"
[[keys.command]]
key = "ctrl+k"
type = "plugin_action"
command = "vim-herdr-navigation.up"
description = "navigate up (vim/herdr)"
[[keys.command]]
key = "ctrl+l"
type = "plugin_action"
command = "vim-herdr-navigation.right"
description = "navigate right (vim/herdr)"

# open Claude Code in a new TAB (tmux `c` = new-window running claude).
# herdr has no "new tab + command" primitive, so create a focused tab (inheriting the
# current pane's cwd) and run claude in its pane.
[[keys.command]]
key = "prefix+c"
type = "shell"
command = '''herdr pane run "$(herdr tab create --cwd "${HERDR_ACTIVE_PANE_CWD:-$HOME}" --label claude --focus | jq -r '.result.root_pane.pane_id')" "claude --effort max --dangerously-skip-permissions --verbose"'''
description = "new Claude Code tab"

# fuzzy command palette across all plugin actions (herdr-command-palette)
[[keys.command]]
key = "prefix+p"
type = "plugin_action"
command = "jt.command-palette.open"
description = "command palette"
